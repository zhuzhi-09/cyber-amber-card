name: Build APK

on:
  push:
    branches: [main]
  schedule:
    - cron: '37 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|v1\.2\.0|v1.2.0-${SHA}|g" www/index.html
          npx cap sync android

      - name: Restore signing keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          RELEASE_KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_B64" | base64 -d > release.keystore
          ls -la release.keystore
          echo "RELEASE_KEYSTORE_PASS=$RELEASE_KEYSTORE_PASS" >> $GITHUB_ENV

      - name: Build APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
        run: |
          ls -la ../release.keystore
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Generate release body
        run: |
          echo "BODY=自动构建于 $(date -u '+%Y-%m-%d %H:%M UTC') | commit $(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: ${{ env.BODY }}
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
