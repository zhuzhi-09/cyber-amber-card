<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16:9 引用卡片生成器</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg-start: #1a1a2e;
    --bg-end: #16213e;
    --accent: #e94560;
    --text: #ffffff;
    --sub: #a0a0b8;
    --card-radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0d0d1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 30px;
  }

  /* ---- Card Preview ---- */
  .card-wrapper {
    width: 100%;
    max-width: 960px;
    margin-bottom: 30px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  #card {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    display: flex;
  }

  /* Background layer */
  .card-bg {
    position: absolute;
    inset: 0;
    background: var(--bg);
    background-size: cover;
    background-position: center;
    z-index: 0;
    transition: background 0.4s;
  }
  /* Dark overlay for text readability when bg image is set */
  .card-bg.has-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
  }

  /* Content layer */
  .card-content {
    position: relative;
    z-index: 1;
    display: flex;
    width: 100%;
    height: 100%;
    padding: 60px 70px;
    gap: 50px;
  }

  /* -- Left Panel -- */
  .left-panel {
    flex: 0 0 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .avatar {
    width: 140px;
    height: 140px;
    border-radius: 12px;
    object-fit: cover;
    border: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  /* -- Right Panel -- */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  .quote-mark {
    font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
    font-size: 100px;
    line-height: 0.6;
    color: rgba(233, 69, 96, 0.5);
    margin-bottom: 10px;
    user-select: none;
  }

  .quote-text {
    font-family: "PingFang SC", "Noto Serif SC", "STSong", Georgia, serif;
    font-size: 36px;
    font-weight: 500;
    line-height: 1.6;
    color: #fff;
    word-break: break-word;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .meta-row {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    gap: 16px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .at-tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .date-tag {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }

  /* ---- Preset Bar ---- */
  .preset-bar {
    width: 100%;
    max-width: 960px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .preset-list {
    flex: 1;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    min-width: 200px;
  }

  .preset-placeholder {
    font-size: 13px;
    color: #555;
    user-select: none;
  }

  .preset-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 6px 8px 6px 14px;
    cursor: pointer;
    font-size: 13px;
    color: #ccc;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .preset-chip:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.25);
  }
  .preset-chip.active {
    background: rgba(233,69,96,0.2);
    border-color: var(--accent);
    color: #fff;
  }

  .preset-chip-del {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #888;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .preset-chip-del:hover {
    background: rgba(233,69,96,0.5);
    color: #fff;
  }

  .preset-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .preset-name-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 12px;
    color: #e0e0e0;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    width: 130px;
    transition: border-color 0.2s;
  }
  .preset-name-input:focus {
    border-color: var(--accent);
  }

  .btn-sm {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  @media (max-width: 700px) {
    .preset-bar { flex-direction: column; align-items: stretch; }
    .preset-actions { justify-content: flex-end; }
  }

  /* ---- Controls ---- */
  .controls {
    width: 100%;
    max-width: 960px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 30px 35px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 30px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .control-group.full {
    grid-column: 1 / -1;
  }

  .control-group label {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .control-group input,
  .control-group textarea {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 14px;
    color: #e0e0e0;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .control-group input:focus,
  .control-group textarea:focus {
    border-color: var(--accent);
  }
  .control-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  .control-group input[type="color"] {
    height: 44px;
    padding: 4px 8px;
    cursor: pointer;
    width: 70px;
  }

  .control-group input[type="file"] {
    padding: 8px 10px;
    font-size: 13px;
    flex: 1;
  }
  .control-group input[type="file"]::file-selector-button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #ccc;
    padding: 6px 14px;
    cursor: pointer;
    margin-right: 10px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .control-group input[type="file"]::file-selector-button:hover {
    background: rgba(255,255,255,0.2);
  }

  .file-upload-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-clear {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #888;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-clear:hover {
    background: rgba(233,69,96,0.3);
    border-color: var(--accent);
    color: #fff;
  }

  .color-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* ---- Buttons ---- */
  .btn-row {
    width: 100%;
    max-width: 960px;
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    padding: 12px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover {
    background: #ff5a7a;
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.14);
  }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: #fff;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 14px;
    letter-spacing: 1px;
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    .controls { grid-template-columns: 1fr; }
    .card-content { padding: 24px; gap: 20px; }
    .left-panel { flex: 0 0 100px; }
    .avatar { width: 80px; height: 80px; }
    .quote-text { font-size: 18px; }
    .quote-mark { font-size: 50px; }
    .at-tag { font-size: 13px; padding: 4px 12px; }
    .date-tag { font-size: 13px; }
  }
</style>
</head>
<body>

<h1>📝 16:9 引用卡片生成器</h1>
<p class="subtitle">编辑内容 → 实时预览 → 一键导出 PNG</p>

<!-- Card -->
<div class="card-wrapper">
  <div id="card">
    <div class="card-bg" id="cardBg"></div>
    <div class="card-content">
      <div class="left-panel">
        <img class="avatar" id="avatar" src="" alt="头像" crossorigin="anonymous">
      </div>
      <div class="right-panel">
        <div class="quote-mark">"</div>
        <div class="quote-text" id="quoteText">生活不是等待暴风雨过去，<br>而是学会在雨中起舞。</div>
        <div class="meta-row">
          <span class="at-tag" id="atTag">@张三</span>
          <span class="date-tag" id="dateTag">2024.06.15</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Preset Bar -->
<div class="preset-bar" id="presetBar">
  <div class="preset-list" id="presetList">
    <span class="preset-placeholder">暂无预设，保存后出现在这里</span>
  </div>
  <div class="preset-actions">
    <input class="preset-name-input" id="presetNameInput" type="text" placeholder="预设名称...">
    <button class="btn btn-sm btn-primary" id="btnSavePreset">💾 保存当前</button>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="control-group full">
    <label>💬 引用文字</label>
    <textarea id="inputQuote" placeholder="输入引用文字...">生活不是等待暴风雨过去，
而是学会在雨中起舞。</textarea>
  </div>
  <div class="control-group">
    <label>📅 日期</label>
    <input id="inputDate" type="text" value="2024.06.15" placeholder="2024.06.15">
  </div>
  <div class="control-group">
    <label>🖼️ 头像图片</label>
    <div class="file-upload-row">
      <input id="inputAvatar" type="file" accept="image/*">
      <button type="button" class="btn-clear" id="btnClearAvatar" title="清除头像">✕</button>
    </div>
  </div>
  <div class="control-group">
    <label>🏷️ @ 昵称</label>
    <input id="inputAt" type="text" value="@张三" placeholder="@昵称">
  </div>
  <div class="control-group">
    <label>🎨 背景颜色 1</label>
    <div class="color-row">
      <input id="inputBgColor1" type="color" value="#1a1a2e">
      <span style="font-size:13px;color:#888;">渐变色起点</span>
    </div>
  </div>
  <div class="control-group">
    <label>🎨 背景颜色 2</label>
    <div class="color-row">
      <input id="inputBgColor2" type="color" value="#16213e">
      <span style="font-size:13px;color:#888;">渐变色终点</span>
    </div>
  </div>
  <div class="control-group full">
    <label>🖼️ 背景图片（会覆盖颜色）</label>
    <div class="file-upload-row">
      <input id="inputBgImage" type="file" accept="image/*">
      <button type="button" class="btn-clear" id="btnClearBg" title="清除背景图">✕</button>
    </div>
  </div>
</div>

<!-- Buttons -->
<div class="btn-row">
  <button class="btn btn-primary" id="btnExport">📥 导出 PNG</button>
  <button class="btn btn-secondary" id="btnReset">🔄 恢复默认</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- IndexedDB 图片存储 ----
const DB_NAME = 'CardGeneratorDB';
const DB_VERSION = 2;
const STORE_NAME = 'images';
const PRESET_STORE = 'presets';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
      if (!db.objectStoreNames.contains(PRESET_STORE)) {
        db.createObjectStore(PRESET_STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function saveImage(key, dataUrl) {
  openDB().then(db => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(dataUrl, key);
  }).catch(() => {});
}

function loadImage(key) {
  return new Promise((resolve) => {
    openDB().then(db => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = function() { resolve(req.result || ''); };
      req.onerror = function() { resolve(''); };
    }).catch(() => resolve(''));
  });
}

function deleteImage(key) {
  openDB().then(db => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(key);
  }).catch(() => {});
}

// ---- 预设 CRUD ----
function getCurrentConfig() {
  return {
    quote: inputQuote.value,
    date: inputDate.value,
    atName: inputAt.value,
    bgColor1: inputBgColor1.value,
    bgColor2: inputBgColor2.value,
    avatarDataUrl: avatarDataUrl,
    bgImageDataUrl: bgImageDataUrl,
  };
}

function applyConfig(cfg) {
  inputQuote.value = cfg.quote || '';
  inputDate.value = cfg.date || '';
  inputAt.value = cfg.atName || '';
  inputBgColor1.value = cfg.bgColor1 || '#1a1a2e';
  inputBgColor2.value = cfg.bgColor2 || '#16213e';
  inputAvatar.value = '';
  inputBgImage.value = '';
  avatarDataUrl = cfg.avatarDataUrl || '';
  bgImageDataUrl = cfg.bgImageDataUrl || '';
  updateCard();
}

function savePreset(name) {
  const cfg = getCurrentConfig();
  cfg.name = name;
  cfg.createdAt = Date.now();
  return new Promise((resolve, reject) => {
    openDB().then(db => {
      const tx = db.transaction(PRESET_STORE, 'readwrite');
      const req = tx.objectStore(PRESET_STORE).add(cfg);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    }).catch(reject);
  });
}

function loadAllPresets() {
  return new Promise((resolve) => {
    openDB().then(db => {
      const tx = db.transaction(PRESET_STORE, 'readonly');
      const req = tx.objectStore(PRESET_STORE).getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { resolve([]); };
    }).catch(() => resolve([]));
  });
}

function deletePreset(id) {
  return new Promise((resolve) => {
    openDB().then(db => {
      const tx = db.transaction(PRESET_STORE, 'readwrite');
      tx.objectStore(PRESET_STORE).delete(id);
      tx.oncomplete = function() { resolve(); };
    }).catch(() => resolve());
  });
}

// ---- DOM refs ----
const card = document.getElementById('card');
const cardBg = document.getElementById('cardBg');
const avatar = document.getElementById('avatar');
const quoteText = document.getElementById('quoteText');
const atTag = document.getElementById('atTag');
const dateTag = document.getElementById('dateTag');

const inputQuote = document.getElementById('inputQuote');
const inputDate = document.getElementById('inputDate');
const inputAvatar = document.getElementById('inputAvatar');
const inputAt = document.getElementById('inputAt');
const inputBgColor1 = document.getElementById('inputBgColor1');
const inputBgColor2 = document.getElementById('inputBgColor2');
const inputBgImage = document.getElementById('inputBgImage');
const btnClearAvatar = document.getElementById('btnClearAvatar');
const btnClearBg = document.getElementById('btnClearBg');
const btnExport = document.getElementById('btnExport');
const btnReset = document.getElementById('btnReset');
const toast = document.getElementById('toast');
const presetList = document.getElementById('presetList');
const presetNameInput = document.getElementById('presetNameInput');
const btnSavePreset = document.getElementById('btnSavePreset');

// ---- File data caches ----
let avatarDataUrl = '';
let bgImageDataUrl = '';

// ---- FileReader helpers ----
function handleFileSelect(file, callback) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) { callback(e.target.result); };
  reader.readAsDataURL(file);
}

// ---- Default avatar (generated via canvas, square shape) ----
function generateDefaultAvatar(name) {
  const canvas = document.createElement('canvas');
  canvas.width = 200;
  canvas.height = 200;
  const ctx = canvas.getContext('2d');

  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  const bgGrad = ctx.createLinearGradient(0, 0, 200, 200);
  bgGrad.addColorStop(0, `hsl(${hue}, 60%, 50%)`);
  bgGrad.addColorStop(1, `hsl(${(hue + 30) % 360}, 60%, 35%)`);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 200, 200);

  const initial = name.charAt(0) || '?';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 90px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(initial, 100, 100);

  return canvas.toDataURL('image/png');
}

// ---- Update card ----
function updateCard() {
  // Quote
  const quoteVal = inputQuote.value.trim() || '（在此输入引用文字）';
  quoteText.innerHTML = quoteVal.replace(/\n/g, '<br>');

  // Date
  dateTag.textContent = inputDate.value.trim() || new Date().toISOString().slice(0, 10);

  // @ tag
  atTag.textContent = inputAt.value.trim() || '@昵称';

  // Avatar
  if (avatarDataUrl) {
    avatar.src = avatarDataUrl;
  } else {
    avatar.src = generateDefaultAvatar(inputAt.value.trim() || '?');
  }

  // Background
  if (bgImageDataUrl) {
    cardBg.style.setProperty('--bg', `url(${bgImageDataUrl})`);
    cardBg.classList.add('has-image');
  } else {
    const c1 = inputBgColor1.value;
    const c2 = inputBgColor2.value;
    cardBg.style.setProperty('--bg', `linear-gradient(135deg, ${c1}, ${c2})`);
    cardBg.classList.remove('has-image');
  }
}

// ---- Event listeners ----
[inputQuote, inputDate, inputAt,
 inputBgColor1, inputBgColor2].forEach(el => {
  el.addEventListener('input', updateCard);
});

// File uploads
inputAvatar.addEventListener('change', function() {
  const file = this.files[0];
  if (file) {
    handleFileSelect(file, function(dataUrl) {
      avatarDataUrl = dataUrl;
      saveImage('avatar', dataUrl);
      updateCard();
    });
  }
});

inputBgImage.addEventListener('change', function() {
  const file = this.files[0];
  if (file) {
    handleFileSelect(file, function(dataUrl) {
      bgImageDataUrl = dataUrl;
      saveImage('background', dataUrl);
      updateCard();
    });
  }
});

// Clear buttons
btnClearAvatar.addEventListener('click', function() {
  inputAvatar.value = '';
  avatarDataUrl = '';
  deleteImage('avatar');
  updateCard();
});

btnClearBg.addEventListener('click', function() {
  inputBgImage.value = '';
  bgImageDataUrl = '';
  deleteImage('background');
  updateCard();
});

// ---- Export PNG ----
btnExport.addEventListener('click', async () => {
  btnExport.textContent = '⏳ 生成中...';
  btnExport.disabled = true;
  try {
    const canvas = await html2canvas(card, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
    });
    const link = document.createElement('a');
    link.download = `引用卡片_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('✅ PNG 已导出！尺寸: ' + canvas.width + '×' + canvas.height);
  } catch (err) {
    showToast('❌ 导出失败: ' + err.message);
  }
  btnExport.textContent = '📥 导出 PNG';
  btnExport.disabled = false;
});

// ---- Reset ----
btnReset.addEventListener('click', () => {
  inputQuote.value = '生活不是等待暴风雨过去，\n而是学会在雨中起舞。';
  inputDate.value = '2024.06.15';
  inputAt.value = '@张三';
  inputBgColor1.value = '#1a1a2e';
  inputBgColor2.value = '#16213e';
  inputAvatar.value = '';
  inputBgImage.value = '';
  avatarDataUrl = '';
  bgImageDataUrl = '';
  updateCard();
  showToast('🔄 已恢复默认');
});

// ---- Toast ----
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ---- Preset UI ----
async function renderPresets() {
  const presets = await loadAllPresets();
  if (presets.length === 0) {
    presetList.innerHTML = '<span class="preset-placeholder">暂无预设，保存后出现在这里</span>';
    return;
  }
  presetList.innerHTML = presets.map(p => {
    const name = p.name || '未命名';
    const label = name.length > 8 ? name.slice(0, 8) + '…' : name;
    return `<span class="preset-chip" data-id="${p.id}" title="${name}">
      ${label}
      <button class="preset-chip-del" data-del="${p.id}" title="删除预设">✕</button>
    </span>`;
  }).join('');
}

// Save preset
btnSavePreset.addEventListener('click', async () => {
  const name = presetNameInput.value.trim();
  if (!name) { showToast('⚠️ 请先输入预设名称'); return; }
  await savePreset(name);
  presetNameInput.value = '';
  await renderPresets();
  showToast('💾 预设「' + name + '」已保存');
});

// Click on preset chip (load or delete)
presetList.addEventListener('click', async (e) => {
  const delBtn = e.target.closest('[data-del]');
  const chip = e.target.closest('[data-id]');

  if (delBtn) {
    e.stopPropagation();
    const id = Number(delBtn.dataset.del);
    await deletePreset(id);
    await renderPresets();
    showToast('🗑️ 预设已删除');
    return;
  }

  if (chip) {
    const id = Number(chip.dataset.id);
    const presets = await loadAllPresets();
    const preset = presets.find(p => p.id === id);
    if (preset) {
      applyConfig(preset);
      // Highlight active chip
      presetList.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      showToast('✅ 已加载预设「' + (preset.name || '未命名') + '」');
    }
  }
});

// ---- Init ----
(async function init() {
  // 从 IndexedDB 恢复之前上传的图片
  const savedAvatar = await loadImage('avatar');
  const savedBg = await loadImage('background');
  if (savedAvatar) avatarDataUrl = savedAvatar;
  if (savedBg) bgImageDataUrl = savedBg;
  updateCard();
  await renderPresets();
  if (savedAvatar || savedBg) {
    showToast('📦 已加载上次保存的图片');
  }
})();
</script>
